<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruletka – NeonCasino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e17; color: #e0e0e0; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid #1a2035; }
    .logo { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 700; letter-spacing: 3px; color: #00ff88; text-transform: uppercase; text-decoration: none; }
    .wallet { display: flex; align-items: center; gap: 10px; background: #111827; border: 1px solid #1e2d40; border-radius: 10px; padding: 9px 16px; }
    .wallet-label { font-size: 0.68rem; color: #556; text-transform: uppercase; letter-spacing: 1px; }
    .wallet-amount { font-size: 1rem; font-weight: 700; color: #00ff88; }

    /* PAGE */
    .page { max-width: 1100px; margin: 28px auto; padding: 0 24px; width: 100%; display: flex; flex-direction: column; gap: 20px; }

    /* SLIDER SECTION */
    .slider-section { background: #0d1220; border: 1px solid #1a2535; border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }

    /* result + timer row */
    .top-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    #resultDisplay { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 800; letter-spacing: 3px; min-width: 220px; }
    #resultDisplay.red   { color: #ff3355; text-shadow: 0 0 20px #ff335560; }
    #resultDisplay.black { color: #e0e0e0; text-shadow: 0 0 20px #ffffff30; }
    #resultDisplay.green { color: #00ff88; text-shadow: 0 0 20px #00ff8860; }
    #resultDisplay.idle  { color: #334455; }

    .timer-block { text-align: right; }
    .phase-label { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: #445566; margin-bottom: 4px; }
    #phaseTimer { font-family: 'JetBrains Mono', monospace; font-size: 1.6rem; font-weight: 800; color: #00ff88; }
    #phaseTimer.spinning { color: #ff9900; }
    .progress-track { width: 180px; height: 4px; background: #1a2535; border-radius: 4px; overflow: hidden; margin-top: 6px; margin-left: auto; }
    #progressBar { height: 100%; background: #00ff88; border-radius: 4px; }
    #progressBar.spinning { background: #ff9900; }

    /* CANVAS WRAP */
    .canvas-wrap { position: relative; width: 100%; height: 120px; border-radius: 10px; overflow: hidden; }
    #sliderCanvas { display: block; width: 100%; height: 120px; }

    /* vignette overlay */
    .vignette {
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to right,
        #0d1220 0%, transparent 18%,
        transparent 82%, #0d1220 100%);
    }

    /* center selector line */
    .selector {
      position: absolute; top: 0; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 3px; background: #00ff88;
      box-shadow: 0 0 12px #00ff88, 0 0 24px #00ff8860;
      pointer-events: none;
    }
    .selector::before, .selector::after {
      content: '';
      position: absolute; left: 50%; transform: translateX(-50%);
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
    }
    .selector::before { top: 0; border-top: 10px solid #00ff88; }
    .selector::after  { bottom: 0; border-bottom: 10px solid #00ff88; }

    /* BET BLOCKS */
    .bet-blocks { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; }

    .bet-block {
      position: relative; padding: 20px 16px; border-radius: 14px;
      border: 1px solid #1e2d40; background: #111827;
      cursor: pointer; text-align: center;
      transition: border-color .2s, background .2s, box-shadow .2s, transform .1s;
      user-select: none;
    }
    .bet-block:hover:not(.disabled) { transform: translateY(-2px); }
    .bet-block.disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .bet-block.red-block   { border-color: #ff335540; }
    .bet-block.red-block:hover:not(.disabled)   { border-color: #ff3355; background: #1a0a10; box-shadow: 0 0 20px #ff335530; }
    .bet-block.black-block { border-color: #33445540; }
    .bet-block.black-block:hover:not(.disabled) { border-color: #aab; background: #111827; box-shadow: 0 0 20px #aabb3320; }
    .bet-block.green-block { border-color: #00ff8840; }
    .bet-block.green-block:hover:not(.disabled) { border-color: #00ff88; background: #0a1f14; box-shadow: 0 0 20px #00ff8830; }

    .block-emoji { font-size: 1.6rem; margin-bottom: 6px; }
    .block-name  { font-size: 0.9rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .block-name.red   { color: #ff3355; }
    .block-name.black { color: #ccd; }
    .block-name.green { color: #00ff88; }
    .block-mult { font-size: 0.72rem; color: #445566; letter-spacing: 1px; margin-bottom: 10px; }
    .block-total { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; font-weight: 700; color: #00ff88; min-height: 1.1rem; }

    .my-badge {
      position: absolute; top: -9px; right: -9px;
      background: #00ff88; color: #0a0e17;
      font-size: 0.68rem; font-weight: 800; padding: 3px 8px;
      border-radius: 20px; display: none; font-family: 'JetBrains Mono', monospace;
    }
    .my-badge.visible { display: block; }

    /* green block is narrower */
    .bet-block.green-block { padding: 20px 12px; }

    /* BOTTOM ROW */
    .bottom-row { display: flex; gap: 20px; align-items: flex-start; }

    /* EVEN/ODD + BET INPUT */
    .controls-col { display: flex; flex-direction: column; gap: 12px; flex: 1; }

    .eo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .eo-btn {
      position: relative; padding: 14px; border-radius: 12px;
      border: 1px solid #1e2d40; background: #111827; color: #aab;
      font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; cursor: pointer; text-align: center;
      transition: border-color .2s, background .2s, color .2s;
    }
    .eo-btn small { display: block; font-size: 0.68rem; color: #445566; margin-top: 2px; }
    .eo-btn:hover:not(:disabled) { border-color: #00aaff66; color: #00aaff; background: #0a1220; }
    .eo-btn:disabled { opacity: .4; cursor: not-allowed; }

    .bet-input-row { display: flex; gap: 10px; align-items: center; }
    .bet-input-row label { font-size: 0.68rem; letter-spacing: 1.5px; text-transform: uppercase; color: #445566; white-space: nowrap; }
    .bet-input-row input[type="number"] {
      flex: 1; background: #0d1220; border: 1px solid #1e2d40; border-radius: 8px;
      color: #e0e0e0; font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 700;
      padding: 10px 12px; outline: none; transition: border-color .2s;
    }
    .bet-input-row input:focus { border-color: #00ff8866; }
    .bet-input-row input::-webkit-inner-spin-button { opacity: .4; }

    .stats-panel { background: #111827; border: 1px solid #1a2535; border-radius: 12px; padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; }
    .stat-row { display: flex; justify-content: space-between; font-size: 0.82rem; padding: 4px 0; border-bottom: 1px solid #1a2535; }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #556; }
    .stat-value { font-weight: 700; color: #00ff88; font-family: 'JetBrains Mono', monospace; }

    /* LIVE BETS + HISTORY */
    .side-col { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }

    .live-bets-wrap { background: #111827; border: 1px solid #1a2535; border-radius: 14px; overflow: hidden; }
    .live-bets-header { display: flex; align-items: center; gap: 8px; padding: 12px 14px; border-bottom: 1px solid #1a2535; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 6px #00ff88; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .live-bets-title { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: #445566; }
    .lb-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .lb-table th { padding: 8px 12px; text-align: left; font-size: 0.62rem; letter-spacing: 1.5px; text-transform: uppercase; color: #334455; font-weight: 700; border-bottom: 1px solid #1a2535; }
    .lb-table td { padding: 9px 12px; border-bottom: 1px solid #0f1825; white-space: nowrap; }
    .lb-table tr:last-child td { border-bottom: none; }
    .lb-table tbody tr { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
    .lb-name { font-weight: 700; color: #aab; }
    .lb-type { font-weight: 700; }
    .lb-type.red { color: #ff3355; } .lb-type.black { color: #ccd; } .lb-type.green { color: #00ff88; }
    .lb-type.even, .lb-type.odd { color: #00aaff; }
    .lb-amount { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: #e0e0e0; text-align: right; }

    .history-wrap { background: #111827; border: 1px solid #1a2535; border-radius: 12px; padding: 14px 16px; }
    .history-label { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: #445566; margin-bottom: 10px; }
    .history-pills { display: flex; flex-wrap: wrap; gap: 7px; }
    .pill { padding: 4px 11px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .pill.red   { background: #1f0a0a; color: #ff3355; border: 1px solid #ff335540; }
    .pill.black { background: #111827; color: #ccd;    border: 1px solid #33445560; }
    .pill.green { background: #0a1f14; color: #00ff88; border: 1px solid #00ff8840; }

    .btn-back { width: 100%; padding: 11px; background: transparent; border: 1px solid #1e2d40; border-radius: 10px; color: #556; font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; text-decoration: none; display: block; text-align: center; transition: border-color .2s, color .2s; }
    .btn-back:hover { border-color: #334; color: #aab; }

    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); padding: 11px 26px; border-radius: 10px; font-weight: 800; font-size: 0.88rem; letter-spacing: 1px; opacity: 0; transition: opacity .3s, transform .3s; pointer-events: none; z-index: 999; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 800px) {
      .bottom-row { flex-direction: column; }
      .side-col { width: 100%; }
      .bet-blocks { grid-template-columns: 1fr 1fr 1fr; }
    }
    @media (max-width: 520px) {
      .bet-blocks { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header>
  <a class="logo" href="index.html">⬡ NeonCasino</a>
  <div class="wallet">
    <span>🪙</span>
    <div>
      <div class="wallet-label">Saldo</div>
      <div class="wallet-amount" id="balanceDisplay">0 PKT</div>
    </div>
  </div>
</header>

<div class="page">

  <!-- SLIDER SECTION -->
  <div class="slider-section">
    <div class="top-row">
      <div id="resultDisplay" class="idle">— OBSTAWIAJ —</div>
      <div class="timer-block">
        <div class="phase-label" id="phaseLabel">OBSTAWIANIE</div>
        <div id="phaseTimer">10.0s</div>
        <div class="progress-track"><div id="progressBar" style="width:100%"></div></div>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="sliderCanvas" height="120"></canvas>
      <div class="vignette"></div>
      <div class="selector"></div>
    </div>

    <!-- BET BLOCKS -->
    <div class="bet-blocks">
      <div class="bet-block red-block" data-bet="red" id="block-red">
        <div class="block-emoji">🔴</div>
        <div class="block-name red">Czerwone</div>
        <div class="block-mult">wypłata 2×</div>
        <div class="block-total" id="total-red">—</div>
        <span class="my-badge" id="badge-red"></span>
      </div>

      <div class="bet-block green-block" data-bet="green" id="block-green">
        <div class="block-emoji">🟢</div>
        <div class="block-name green">Zero</div>
        <div class="block-mult">wypłata 35×</div>
        <div class="block-total" id="total-green">—</div>
        <span class="my-badge" id="badge-green"></span>
      </div>

      <div class="bet-block black-block" data-bet="black" id="block-black">
        <div class="block-emoji">⚫</div>
        <div class="block-name black">Czarne</div>
        <div class="block-mult">wypłata 2×</div>
        <div class="block-total" id="total-black">—</div>
        <span class="my-badge" id="badge-black"></span>
      </div>
    </div>
  </div>

  <!-- BOTTOM ROW -->
  <div class="bottom-row">
    <div class="controls-col">
      <div class="bet-input-row">
        <label>Stawka</label>
        <input type="number" id="betInput" min="1" value="100" />
      </div>
      <div class="eo-grid">
        <button class="eo-btn" data-bet="even">Parzyste<small>wypłata 2×</small><span class="my-badge" id="badge-even"></span></button>
        <button class="eo-btn" data-bet="odd">Nieparzyste<small>wypłata 2×</small><span class="my-badge" id="badge-odd"></span></button>
      </div>
      <div class="stats-panel">
        <div class="stat-row"><span class="stat-label">Moje zakłady</span><span class="stat-value" id="totalBetDisplay">0 PKT</span></div>
        <div class="stat-row"><span class="stat-label">Potencjalna wygrana</span><span class="stat-value" id="potentialDisplay">0 PKT</span></div>
      </div>
    </div>

    <div class="side-col">
      <div class="live-bets-wrap">
        <div class="live-bets-header"><div class="live-dot"></div><span class="live-bets-title">Live Bets</span></div>
        <table class="lb-table">
          <thead><tr><th>Gracz</th><th>Typ</th><th>Kwota</th></tr></thead>
          <tbody id="liveBetsBody"></tbody>
        </table>
      </div>
      <div class="history-wrap">
        <div class="history-label">Historia ostatnich wyników</div>
        <div class="history-pills" id="historyPills"></div>
      </div>
      <a class="btn-back" href="index.html">← Powrót do Lobby</a>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
  // ── BALANCE ──
  const BAL_KEY    = 'casino_balance';
  const getBalance = () => parseInt(localStorage.getItem(BAL_KEY) || '25000', 10);
  const setBalance = v  => { localStorage.setItem(BAL_KEY, String(v)); renderBalance(); };
  const renderBalance  = () => {
    document.getElementById('balanceDisplay').textContent = getBalance().toLocaleString('pl-PL') + ' PKT';
  };
  renderBalance();

  // ── ROULETTE DATA ──
  // European roulette wheel order
  const WHEEL_ORDER = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
  const RED_NUMS    = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
  function numColor(n) { return n === 0 ? 'green' : RED_NUMS.has(n) ? 'red' : 'black'; }

  // ── SLIDER CANVAS ──
  const canvas  = document.getElementById('sliderCanvas');
  const ctx     = canvas.getContext('2d');
  const TILE_W  = 80;
  const TILE_H  = 120;
  const REPEAT  = 6; // how many times we repeat the sequence
  const STRIP   = WHEEL_ORDER.length; // 37 tiles per repeat
  const TOTAL_W = STRIP * REPEAT * TILE_W;

  // offset: pixels from left edge of the full strip to the center of tile[0]
  let offset    = 0; // current scroll position (px, increases = moves left)
  let velocity  = 0;
  let spinning  = false;
  let rafId     = null;

  function resizeCanvas() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = TILE_H;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function drawStrip() {
    const W = canvas.width;
    ctx.clearRect(0, 0, W, TILE_H);

    // which tile is at the left edge?
    const startTile = Math.floor(offset / TILE_W);
    const drawFrom  = startTile - 1;
    const drawCount = Math.ceil(W / TILE_W) + 3;

    for (let i = drawFrom; i < drawFrom + drawCount; i++) {
      const idx = ((i % (STRIP * REPEAT)) + STRIP * REPEAT) % (STRIP * REPEAT);
      const num = WHEEL_ORDER[idx % STRIP];
      const col = numColor(num);

      const x = i * TILE_W - offset;
      const y = 0;

      // background
      ctx.fillStyle = col === 'green' ? '#00aa55' : col === 'red' ? '#aa1122' : '#141428';
      ctx.fillRect(x + 2, y + 2, TILE_W - 4, TILE_H - 4);

      // border
      ctx.strokeStyle = col === 'green' ? '#00ff8860' : col === 'red' ? '#ff335560' : '#22334460';
      ctx.lineWidth   = 1;
      ctx.strokeRect(x + 2, y + 2, TILE_W - 4, TILE_H - 4);

      // number
      ctx.fillStyle    = '#ffffff';
      ctx.font         = 'bold 22px JetBrains Mono, monospace';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(num, x + TILE_W / 2, TILE_H / 2);
    }
  }

  drawStrip();

  // ── SPIN ──
  // targetNum: the number we want under the selector (center of canvas)
  function spinToNumber(targetNum, onDone) {
    spinning = true;
    const W = canvas.width;
    const centerX = W / 2;

    // find the tile index in the middle repeat (repeat index = 2) that matches targetNum
    const baseRepeat = 2;
    let targetTileIdx = -1;
    for (let i = 0; i < STRIP; i++) {
      if (WHEEL_ORDER[i] === targetNum) { targetTileIdx = baseRepeat * STRIP + i; break; }
    }

    // pixel position of center of that tile
    const targetCenter = targetTileIdx * TILE_W + TILE_W / 2;
    // we want: targetCenter - offset = centerX  →  offset = targetCenter - centerX
    const targetOffset = targetCenter - centerX;

    // add extra full loops for drama (3–5 full strips)
    const extraLoops = (3 + Math.floor(Math.random() * 3)) * STRIP * TILE_W;
    const finalOffset = targetOffset + extraLoops;

    const startOffset = offset;
    const distance    = finalOffset - startOffset;
    const duration    = 3800 + Math.random() * 600; // ms
    const startTime   = performance.now();

    function frame(now) {
      const t    = Math.min(1, (now - startTime) / duration);
      // ease out quint
      const ease = 1 - Math.pow(1 - t, 5);
      offset = startOffset + distance * ease;
      drawStrip();
      if (t < 1) { rafId = requestAnimationFrame(frame); }
      else { offset = finalOffset; drawStrip(); spinning = false; if (onDone) onDone(); }
    }
    rafId = requestAnimationFrame(frame);
  }

  // idle drift animation
  function idleDrift() {
    if (spinning) return;
    offset += 0.4;
    drawStrip();
    rafId = requestAnimationFrame(idleDrift);
  }
  rafId = requestAnimationFrame(idleDrift);

  // ── GAME LOOP ──
  const BET_DURATION  = 10000;
  const SPIN_DURATION = 4500;
  const RESULT_PAUSE  = 3000;

  let phase      = 'betting';
  let phaseStart = 0;
  let timerRaf   = null;
  let bets       = { red:0, black:0, green:0, even:0, odd:0 };
  // bot bets per round (for display in blocks)
  let botBets    = { red:0, black:0, green:0 };
  const history  = [];

  function startPhase(p) {
    phase      = p;
    phaseStart = performance.now();
    cancelAnimationFrame(timerRaf);
    timerRaf   = requestAnimationFrame(timerLoop);

    if (p === 'betting') {
      document.getElementById('phaseLabel').textContent    = 'OBSTAWIANIE';
      document.getElementById('phaseTimer').className      = '';
      document.getElementById('progressBar').className     = '';
      document.getElementById('resultDisplay').textContent = '— OBSTAWIAJ —';
      document.getElementById('resultDisplay').className   = 'idle';
      setBetBtns(false);
      botBets = { red:0, black:0, green:0 };
      updateBlockTotals();
      scheduleBotBets();
      // restart idle drift
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(idleDrift);
    } else {
      document.getElementById('phaseLabel').textContent = 'KRĘCENIE';
      document.getElementById('phaseTimer').className   = 'spinning';
      document.getElementById('progressBar').className  = 'spinning';
      setBetBtns(true);
      const result = Math.floor(Math.random() * 37);
      cancelAnimationFrame(rafId);
      spinToNumber(result, () => showResult(result));
    }
  }

  function timerLoop(now) {
    const total     = phase === 'betting' ? BET_DURATION : SPIN_DURATION;
    const remaining = Math.max(0, total - (now - phaseStart));
    document.getElementById('phaseTimer').textContent   = (remaining / 1000).toFixed(1) + 's';
    document.getElementById('progressBar').style.width = (remaining / total * 100) + '%';
    if (remaining <= 0) { if (phase === 'betting') startPhase('spinning'); return; }
    timerRaf = requestAnimationFrame(timerLoop);
  }

  // ── RESULT ──
  function showResult(num) {
    const col   = numColor(num);
    const label = col === 'green' ? 'ZERO' : col === 'red' ? 'CZERWONE' : 'CZARNE';
    const el    = document.getElementById('resultDisplay');
    el.textContent = num + ' — ' + label;
    el.className   = col;

    let won = 0;
    if (bets.red   && col === 'red')              won += bets.red   * 2;
    if (bets.black && col === 'black')            won += bets.black * 2;
    if (bets.green && col === 'green')            won += bets.green * 35;
    if (num !== 0 && bets.even && num % 2 === 0) won += bets.even  * 2;
    if (num !== 0 && bets.odd  && num % 2 !== 0) won += bets.odd   * 2;

    if (won > 0) { setBalance(getBalance() + won); showToast('+' + won.toLocaleString('pl-PL') + ' PKT — WYGRANA!'); }
    else showToast('Nie trafiłeś. Spróbuj ponownie!', true);

    addHistory(num, col);
    resetBets();
    setTimeout(() => startPhase('betting'), RESULT_PAUSE);
  }

  // ── BETTING ──
  function placeBet(type) {
    if (phase !== 'betting') return;
    const amt = parseInt(document.getElementById('betInput').value, 10);
    if (!amt || amt < 1) return;
    if (amt > getBalance()) { showToast('Niewystarczające saldo!', true); return; }
    setBalance(getBalance() - amt);
    bets[type] = (bets[type] || 0) + amt;
    updateBetUI();
  }

  document.querySelectorAll('[data-bet]').forEach(el => {
    el.addEventListener('click', () => placeBet(el.dataset.bet));
  });

  const MULT = { red:2, black:2, green:35, even:2, odd:2 };

  function updateBetUI() {
    let total = 0, potential = 0;
    Object.entries(bets).forEach(([k, v]) => {
      total += v; potential += v * MULT[k];
      const b = document.getElementById('badge-' + k);
      if (b) { b.textContent = '+' + v.toLocaleString('pl-PL'); b.classList.toggle('visible', v > 0); }
    });
    document.getElementById('totalBetDisplay').textContent  = total.toLocaleString('pl-PL') + ' PKT';
    document.getElementById('potentialDisplay').textContent = potential.toLocaleString('pl-PL') + ' PKT';
    updateBlockTotals();
  }

  function updateBlockTotals() {
    ['red','black','green'].forEach(k => {
      const myAmt  = bets[k] || 0;
      const botAmt = botBets[k] || 0;
      const total  = myAmt + botAmt;
      const el     = document.getElementById('total-' + k);
      el.textContent = total > 0 ? total.toLocaleString('pl-PL') + ' PKT' : '—';
    });
  }

  function resetBets() { bets = { red:0, black:0, green:0, even:0, odd:0 }; updateBetUI(); }

  function setBetBtns(disabled) {
    document.querySelectorAll('[data-bet]').forEach(el => {
      if (el.classList.contains('bet-block')) el.classList.toggle('disabled', disabled);
      else el.disabled = disabled;
    });
  }

  // ── HISTORY ──
  function addHistory(num, col) {
    history.unshift({ num, col });
    if (history.length > 10) history.pop();
    const c = document.getElementById('historyPills');
    c.innerHTML = '';
    history.forEach(h => {
      const p = document.createElement('span');
      p.className = 'pill ' + h.col;
      p.textContent = h.num;
      c.appendChild(p);
    });
  }

  // ── BOT LIVE BETS ──
  const BOT_NAMES  = ['Janusz_Krypto','Wygrany_Marek','Lucky_Ania','NeonWolf','xKing99','CasinoJan','DiamondTom','Szybki_Zbyszek','MegaKasjer','Gracz_PL'];
  const BET_TYPES  = ['red','black','green','even','odd'];
  const BET_LABELS = { red:'Czerwone', black:'Czarne', green:'Zero', even:'Parzyste', odd:'Nieparzyste' };
  let botTimers    = [];

  function scheduleBotBets() {
    botTimers.forEach(clearTimeout); botTimers = [];
    document.getElementById('liveBetsBody').innerHTML = '';
    const count = 5 + Math.floor(Math.random() * 5);
    for (let i = 0; i < count; i++) {
      const delay = 300 + i * 750 + Math.random() * 400;
      botTimers.push(setTimeout(() => {
        if (phase !== 'betting') return;
        const name = BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)];
        const type = BET_TYPES[Math.floor(Math.random() * BET_TYPES.length)];
        const amt  = (Math.floor(Math.random() * 150) + 10) * 100;
        // accumulate bot bets for block totals
        if (botBets[type] !== undefined) { botBets[type] += amt; updateBlockTotals(); }
        const tbody = document.getElementById('liveBetsBody');
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="lb-name">${name}</td><td class="lb-type ${type}">${BET_LABELS[type]}</td><td class="lb-amount">${amt.toLocaleString('pl-PL')}</td>`;
        tbody.prepend(tr);
        while (tbody.rows.length > 10) tbody.deleteRow(tbody.rows.length - 1);
      }, delay));
    }
  }

  // ── TOAST ──
  function showToast(msg, bad = false) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.background = bad ? '#ff3355' : '#00ff88'; t.style.color = bad ? '#fff' : '#0a0e17';
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── BOOT ──
  startPhase('betting');
</script>
</body>
</html>
